<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="beeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  <!-- Hive hexagon behind -->
  <polygon points="40,30 110,5 180,30 180,70 110,95 40,70" fill="url(#beeGrad)" opacity="0.15"/>
  <!-- Bee body -->
  <ellipse cx="110" cy="50" rx="35" ry="18" fill="url(#beeGrad)"/>
  <!-- Stripes -->
  <path d="M85,50 Q110,35 135,50" fill="none" stroke="#92400E" stroke-width="3"/>
  <path d="M93,50 Q110,42 127,50" fill="none" stroke="#92400E" stroke-width="3"/>
  <!-- Wings hint -->
  <ellipse cx="90" cy="38" rx="14" ry="6" fill="#E0F2FE" opacity="0.8"/>
  <!-- Antennae -->
  <line x1="100" y1="28" x2="96" y2="18" stroke="#1F2937" stroke-width="2"/>
  <line x1="120" y1="28" x2="124" y2="18" stroke="#1F2937" stroke-width="2"/>
  <!-- Text: The Hive -->
  <text x="220" y="60" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="700" fill="#1F2937">The Hive</text>
  <text x="220" y="85" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="500" fill="#6366F1">by Stupendous Software</text>
</svg>
