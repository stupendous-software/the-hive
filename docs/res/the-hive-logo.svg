<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <linearGradient id="hiveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Bee body (simplified) -->
  <ellipse cx="50" cy="60" rx="25" ry="18" fill="url(#hiveGrad)" />
  <!-- Bee stripes -->
  <path d="M35 50 Q50 45 65 50" stroke="#92400E" stroke-width="3" fill="none"/>
  <path d="M35 60 Q50 55 65 60" stroke="#92400E" stroke-width="3" fill="none"/>
  <path d="M35 70 Q50 65 65 70" stroke="#92400E" stroke-width="3" fill="none"/>
  <!-- Bee head -->
  <circle cx="30" cy="60" r="10" fill="#FCD34D"/>
  <!-- Bee antenna -->
  <line x1="22" y1="52" x2="15" y2="40" stroke="#92400E" stroke-width="2"/>
  <line x1="26" y1="52" x2="30" y2="38" stroke="#92400E" stroke-width="2"/>
  <!-- Hexagon behind bee -->
  <path d="M70 25 L100 15 L130 25 L145 50 L130 75 L100 85 L70 75 L55 50 Z" fill="url(#hiveGrad)" opacity="0.2"/>
  <!-- Text: The Hive -->
  <text x="160" y="55" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="28" fill="#1F2937">The Hive</text>
  <text x="160" y="80" font-family="Arial, Helvetica, sans-serif" font-weight="300" font-size="16" fill="#6B7280">Extension</text>
</svg>
