<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#9333EA"/>
    </linearGradient>
  </defs>
  <!-- Hexagon -->
  <polygon points="40,20 70,5 130,5 160,20 160,60 130,75 70,75 40,60" fill="url(#hexGrad)" opacity="0.95"/>
  <!-- Inner hexagon for depth -->
  <polygon points="70,15 90,8 130,8 150,15 150,55 130,62 90,62 70,55" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  <!-- Text: Stupendous -->
  <text x="180" y="50" font-family="Arial,Helvetica,sans-serif" font-size="38" font-weight="900" fill="#1F2937">STUPENDOUS</text>
  <text x="180" y="78" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="600" fill="#6366F1">SOFTWARE</text>
</svg>
