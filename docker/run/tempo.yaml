server:
  http_listen_port: 3200
  grpc_listen_port: 9095

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

query:
  frontend_jaeger:
    enabled: true
  frontend_zipkin:
    enabled: false
